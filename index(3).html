<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXUUY | الروابط الرسمية</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f0c29;
      background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 40px 20px;
      border-radius: 25px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 35px;
      letter-spacing: 5px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      text-decoration: none;
      color: #fff;
      border-radius: 12px;
      font-weight: 700;
      font-size: 18px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      border: none;
      cursor: pointer;
    }

    .link:hover {
      transform: scale(1.03);
      filter: brightness(1.1);
    }

    /* ألوان المنصات */
    .instagram { background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045); box-shadow: 0 0 20px rgba(253, 29, 29, 0.4); }
    .tiktok { background: linear-gradient(90deg, #00f2ea, #000000, #ff0050); box-shadow: 0 0 20px rgba(0, 242, 234, 0.4); }
    .facebook { background: linear-gradient(90deg, #1877F2, #0056b3); box-shadow: 0 0 20px rgba(24, 119, 242, 0.4); }
    .youtube { background: linear-gradient(90deg, #ff0000, #cc0000); box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
    .whatsapp { background: linear-gradient(90deg, #25D366, #128C7E); box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }
    .x-store, .x-private { background: linear-gradient(90deg, #111, #333); box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
    .discord { background: linear-gradient(90deg, #5865F2, #8547C6); box-shadow: 0 0 20px rgba(88, 101, 242, 0.4); }
    .telegram { background: linear-gradient(90deg, #0088cc, #00aaff); box-shadow: 0 0 20px rgba(0, 136, 204, 0.4); }

    footer {
      margin-top: 30px;
      font-size: 13px;
      opacity: 0.7;
      letter-spacing: 2px;
      font-family: 'Orbitron', sans-serif;
    }

    i { font-size: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>AXUUY</h1>

    <div class="links-grid">
      
      <a class="link instagram" href="https://instagram.com/zx6sq" target="_blank">
        <i class="fab fa-instagram"></i> Instagram Private
      </a>
      <a class="link instagram" href="https://instagram.com/shop_Ta1" target="_blank">
        <i class="fab fa-instagram"></i> Instagram Store
      </a>

      <a class="link facebook" href="https://www.facebook.com/61574327138771/" target="_blank">
        <i class="fab fa-facebook"></i> Facebook Page
      </a>

      <a class="link tiktok" href="https://www.tiktok.com/@zx6sq" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
      </a>

      <a class="link youtube" href="https://www.youtube.com/@AXUUY" target="_blank">
        <i class="fab fa-youtube"></i> YouTube
      </a>

      <a class="link whatsapp" href="https://whatsapp.com/channel/0029Vb7hA164Spk9FWVuV53Q" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp Channel
      </a>

      <a class="link x-store" href="https://x.com/shop_Ta1" target="_blank">
        <i class="fab fa-x-twitter"></i> AXUUY Store (X)
      </a>
      <a class="link x-private" href="https://x.com/lS4BrI3C3I99362" target="_blank">
        <i class="fab fa-x-twitter"></i> Private Account (X)
      </a>

      <a class="link discord" href="https://discord.gg/ZTkuEPEQAU" target="_blank">
        <i class="fab fa-discord"></i> Discord
      </a>
      <a class="link telegram" href="https://t.me/shop_Ta1" target="_blank">
        <i class="fab fa-telegram"></i> Telegram
      </a>

    </div>

    <footer>
      © AXUUY
    </footer>
  </div>

</body>
</html>
